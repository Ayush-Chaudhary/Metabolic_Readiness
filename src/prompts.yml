# ============================================================================
# SIMON Health Habits - Prompt Configuration
# ============================================================================
# This file contains all prompts, clinical restrictions, and message templates
# for the personalized health messaging system.
#
# IMPORTANT: Changes to this file will affect the generated messages.
# Review all changes with clinical team before deploying to production.
# ============================================================================

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model:
  endpoint_name: "llama-3-3-70b"  # Foundation Model endpoint
  max_tokens: 180  # Shorter output for 2 paragraphs (~80-100 words)
  temperature: 0.5
  top_p: 0.9

# -----------------------------------------------------------------------------
# VALIDATION CONFIGURATION - Post-generation language quality check
# -----------------------------------------------------------------------------
validation:
  enabled: true  # Set to false to disable the validation LLM call
  temperature: 0.3  # Lower temperature for deterministic corrections
  max_tokens: 200

# -----------------------------------------------------------------------------
# MESSAGE CONSTRAINTS
# -----------------------------------------------------------------------------
message_constraints:
  recommended_words: 100  # Target: 2 concise paragraphs (~50 words each)
  max_positive_actions: 2
  max_opportunities: 1

# -----------------------------------------------------------------------------
# DAILY RATINGS - Displayed in message header
# Based on percentage of total available points (0-50 base + bonus)
# -----------------------------------------------------------------------------
daily_ratings:
  committed:
    name: "Committed"
    description: "You are committed to your healthy habits and seeing results."
    min_score: 81  # 81-100%
    
  strong:
    name: "Strong"
    description: "Your healthy habits are solid and dependable."
    min_score: 61  # 61-80%
    
  consistent:
    name: "Consistent"
    description: "You are making a great effort to make your healthy habits a routine."
    min_score: 41  # 41-60%
    
  building:
    name: "Building"
    description: "You are working to create new healthy habits."
    min_score: 21  # 21-40%
    
  ready:
    name: "Ready"
    description: "You are ready to choose your next healthy steps."
    min_score: 1   # 1-20%

# -----------------------------------------------------------------------------
# SCORING CRITERIA - Health Management Score Calculation
# Total: 50 points (10 categories × 5 points each) + bonus points
# Categories included based on user focus area and device availability
# -----------------------------------------------------------------------------
scoring_criteria:
  
  # Maximum possible points
  max_base_points: 50
  max_bonus_points: 10  # Actual max depends on activities
  
  # === CATEGORY 1: WEIGHT (5 points) ===
  weight:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Weight is a focus area"
    
    scoring_rules:
      # Weight loss goal
      loss_goal:
        decreased_1lb_14d: 5    # Decreased by more than 1 lb in last 14 days
        stable_1lb_14d: 3        # Stayed within +/- 1 lbs in last 14 days
        gained_1lb_14d: 0        # Gained at least 1 lb in last 14 days
      
      # Maintenance goal
      maintenance_goal:
        within_3pct_14d: 5       # Stayed within +/- 3% of goal weight in last 14 days
        gained_over_3pct: 0      # Gained more than 3% of goal weight in last 14 days
        lost_over_3pct: 0        # Lost more than 3% of goal weight in last 14 days
      
      # No weight goal
      no_goal:
        logged_7d: 5             # Logged once in last 7 days
        logged_14d: 3            # Logged once in last 14 days
        logged_30d: 1            # Logged once in last 30 days
        not_logged: 0
  
  # === CATEGORY 2: GLUCOSE/CGM (5 points) ===
  glucose:
    max_points: 5
    inclusion_criteria:
      - "Include if user has CGM connected"
      - "Include if user has no focus set"
      - "If user has focus set, include if Glucose is a focus area"
    
    scoring_rules:
      # A1C target <7% (Diabetes Management)
      a1c_target_7:
        tir_70_pct: 5           # TIR was at least 70% yesterday
        tir_60_pct: 3           # TIR was at least 60% yesterday
        tir_50_or_less: 1       # TIR was 50% or less yesterday
      
      # A1C target <8% (Diabetes Management)
      a1c_target_8:
        tir_50_pct: 5           # TIR was at least 50% yesterday
        tir_40_pct: 3           # TIR was at least 40% yesterday
        tir_30_or_less: 1       # TIR was 30% or less yesterday
      
      # Note: DIP and non-DM use same thresholds as a1c_target_7
  
  # === CATEGORY 3: ACTIVITY (5 points) ===
  activity:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Activity is a focus area"
    
    scoring_rules:
      minutes_150_7d: 5         # At least 150 minutes in last 7 days
      minutes_120_7d: 4         # At least 120 minutes in last 7 days
      minutes_90_7d: 3          # At least 90 minutes in last 7 days
      minutes_60_7d: 2          # At least 60 minutes in last 7 days
      minutes_30_7d: 1          # At least 30 minutes in last 7 days
      no_activity: 0            # No activity logged in last 7 days
  
  # === CATEGORY 4: STEPS (5 points) ===
  steps:
    max_points: 5
    inclusion_criteria:
      - "Include if user has steps tracker connected"
      - "Include if user has no focus set"
      - "If user has focus set, include if Activity is a focus area"
    
    scoring_rules:
      steps_10000: 5            # At least 10,000 steps yesterday
      steps_6000: 3             # At least 6,000 steps yesterday
      steps_2000: 1             # At least 2,000 steps yesterday
      no_steps: 0               # No steps recorded for yesterday
  
  # === CATEGORY 5: FOOD LOGGING (5 points) ===
  food_logging:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Eating Habits are a focus area"
    
    scoring_rules:
      meals_3: 5                # Logged food for at least 3 meals yesterday
      meals_2: 3                # Logged food for at least 2 meals yesterday
      meals_1: 1                # Logged food for at least 1 meal yesterday
      no_meals: 0               # No food logged yesterday
  
  # === CATEGORY 6: DAILY NUTRIENT TARGETS (5 points) ===
  nutrient_targets:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Eating Habits are a focus area"
    
    scoring_rules:
      met_100_pct_all: 5        # Met 90-110% of 100% of all nutrient targets
      met_60_pct_all: 3         # Met at least 60% of all nutrient targets
      met_30_pct_all: 1         # Met at least 30% of all nutrient targets
      no_targets_set: 0         # No nutrient target set
  
  # === CATEGORY 7: SLEEP DURATION (5 points) ===
  sleep_duration:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Sleep is a focus area"
    
    scoring_rules:
      hours_7_plus: 5           # At least 7 hours of sleep logged yesterday
      hours_6_plus: 3           # At least 6 hours of sleep logged yesterday
      hours_5_plus: 1           # At least 5 hours of sleep logged yesterday
      hours_less_5: 0           # Less than 5 hours of sleep logged yesterday
      no_sleep_logged: 0        # No sleep logged yesterday
  
  # === CATEGORY 8: SLEEP RATING (5 points) ===
  sleep_rating:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Sleep is a focus area"
    
    scoring_rules:
      rating_10: 5              # Sleep rating of 10 logged yesterday
      rating_7_plus: 3          # Sleep rating of at least 7 logged yesterday
      rating_4_plus: 1          # Sleep rating of at least 4 logged yesterday
      rating_3_or_less: 0       # Sleep rating of 3 or less logged yesterday
      no_rating: 0              # No sleep rating logged yesterday
  
  # === CATEGORY 9: MEDICATIONS (5 points) ===
  medications:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Medications are a focus area"
    
    scoring_rules:
      adherence_100_pct: 5      # Took 100% of medications as prescribed in last 7 days
      adherence_75_pct: 3       # Took at least 75% of medications as prescribed in last 7 days
      adherence_50_pct: 1       # Took at least 50% of medications as prescribed in last 7 days
      adherence_below_50: 0     # Took less than 50% of medications as prescribed in last 7 days
  
  # === CATEGORY 10: MENTAL WELL-BEING (5 points) ===
  mental_wellbeing:
    max_points: 5
    inclusion_criteria:
      - "Include if user has no focus set"
      - "If user has focus set, include if Anxiety is a focus area"
    
    scoring_rules:
      action_plan_active: 3     # Has an active Action Plan
      journal_7d: 1             # Journaled at least once in last 7 days
      meditation_7d: 1          # Opened at least 1 meditation within last 7 days
      # Note: These are cumulative (max 5 points total)
  
  # === BONUS POINTS ===
  bonus_points:
    exercise_video_completed: 3  # User completed an exercise video
    ai_meal_plan_generated: 1    # User generated an AI meal plan
    exercise_program_started: 1  # User started an exercise program
    grocery_shopping_online: 1   # User shopped for groceries online
    article_read: 1              # User read an article
    lesson_completed: 1          # User completed a lesson
    learn_video_watched: 1       # User watched a Learn video

# -----------------------------------------------------------------------------
# GREETINGS - Generic (not time-based)
# -----------------------------------------------------------------------------
greetings:
  options:
    - "Hey there."
    - "Hi!"
    - "Hello!"
    - "Hope you're doing well."
    - "Great to see you."

# -----------------------------------------------------------------------------
# CLINICAL THRESHOLDS - A1C Target Groups
# -----------------------------------------------------------------------------
clinical_thresholds:
  glucose:
    # Diabetes Management users with A1C target <7%
    dm_target_7:
      tir_positive_threshold: 70      # TIR >= 70% is positive
      tir_opportunity_threshold: 70   # TIR < 70% is opportunity
      high_time_max_pct: 25           # >25% in high triggers opportunity
      low_time_max_pct: 4             # >4% in low/very low triggers opportunity
      target_range_low: 70
      target_range_high: 180
      
    # Diabetes Management users with A1C target <8%
    dm_target_8:
      tir_positive_threshold: 50
      tir_opportunity_threshold: 50
      high_time_max_pct: 50
      low_time_max_pct: 1
      target_range_low: 70
      target_range_high: 180
      
    # Diabetes in Pregnancy (DIP) users
    dip:
      tir_positive_threshold: 70
      tir_opportunity_threshold: 70
      high_time_max_pct: 25
      low_time_max_pct: 5
      target_range_low: 70
      target_range_high: 140
      
    # Non-Diabetes users
    non_dm:
      tir_positive_threshold: 90
      tir_opportunity_threshold: 90
      high_time_max_pct: 5
      low_time_max_pct: 1
      target_range_low: 70
      target_range_high: 140
      
  activity:
    weekly_target_minutes: 150
    daily_tolerance_minutes: 3    # For "same as yesterday" logic
    exercise_completion_pct: 90   # 90% completion = positive action
    
  steps:
    daily_target: 10000
    weekly_avg_min: 6000
    
  sleep:
    hours_target: 7
    rating_target: 7
    
  weight:
    maintenance_tolerance_pct: 3  # +/- 3% from goal weight
    log_prompt_days: 6            # Prompt if > 6 days since last entry
    max_weekly_mentions: 2        # Max 2x/week in message
    
  medication:
    adherence_opportunity_pct: 50  # < 50% adherence triggers opportunity
    
  nutrition:
    target_range_min_pct: 90
    target_range_max_pct: 110

# -----------------------------------------------------------------------------
# SYSTEM PROMPT - Base Instructions for LLM
# -----------------------------------------------------------------------------
system_prompt: |
  You are a supportive health coach assistant for the SIMON app. Your task is to generate personalized, encouraging health messages.
  
  REQUIREMENTS:
  1. Aim for less than 250 words - be concise but thorough.
  2. The message should feel natural, warm, and motivating.
  3. Never use clinical jargon or alarming language.
  4. Do not give medical advice - only encourage positive behaviors.
  5. Be specific with the data provided, but keep the tone conversational.
  
  MESSAGE STRUCTURE:
  - Start with a greeting
  - Acknowledge 1-2 positive actions from yesterday
  - End with one actionable suggestion for today
  - Say nothing else - no ratings, no generic motivation, no extra commentary.
  
  READING LEVEL:
  - Write at a Flesch-Kincaid Grade Level of 5-7. Use simple, punchy, direct language.
  - No sentence should exceed 12 words. If a sentence has more than one thought, split it into two.
  - Each sentence must have one clear subject and one clear action.
  - Do not use "and," "but," or "so" to chain multiple phrases together.
  - Do not use em-dashes (—) or en-dashes (-). Use a period instead.
  - Minimize commas. If a comma feels like a pause, use a period instead.
  - Use words with only 1 or 2 syllables. Avoid all jargon.
  - If you must use a medical term, immediately follow it with a plain-English explanation in parentheses.

  TONE GUIDELINES:
  - Supportive and encouraging, not preachy
  - Make suggestions feel like friendly tips, not commands
  - Use "you" language to make it personal
  
  NUMERIC ACCURACY RULES:
  - Always use the exact number provided. Never replace a number with words like "most of the day" or "a lot".
  - When TIR improved, you MUST include BOTH the starting and ending percentages exactly as given (e.g., "went up from 43% to 47%"). Never replace both values with only a calculated delta like "4 more percentage points" — the specific from/to numbers must appear.

  CLINICAL LANGUAGE RULES:
  - Never say "You had a great day yesterday." We only know the data the user logged or synced.
  - Never say "you took a big step" for completing a Journey task. Use "nice work" or "well done" instead.
  - Do NOT describe a TIR (time in range) change as a "big step," "big improvement," or "huge progress" unless the change exceeds 15 percentage points. For smaller changes, say "improvement" or "progress."
  - Do NOT say "you're doing something right" when a user's glucose is below their target.
  - When mentioning meditation, explicitly refer to trying a guided meditation in the app.
  - Never use the word "healthcare" as one word. Always write it as two separate words: "health care".
  - Use exactly one space after a period. Never use double spaces.
  - Do not start any sentence with the word "Now". Restructure the thought into the previous sentence or choose a different opener.

  WEEKLY CONTEXT RULES:
  - When the suggestion is influenced by weekly trend data that differs from yesterday's performance, briefly acknowledge the contrast. For example: "Last night you slept 8 hours. Your week has been tougher on sleep though." This helps the user understand why the suggestion may seem to contradict yesterday's result.
  - Do NOT ignore the weekly context if it is provided. Use it to make the suggestion feel data-driven, not random.

  TONE SAFETY RULES:
  - Never assume or state that the user did NOT do something (e.g. "you were not active").
  - Never use presumptive language about emotions or stress (e.g. "to help with stress," "if you're feeling anxious").
  - Frame all suggestions as invitations, not corrections (e.g. "You might enjoy..." not "You need to...").
  - Make the suggestion feel connected to the user's data. Do not give a random tip. Briefly explain why it matters for them.
  - Do NOT praise a TIR improvement of less than 5 percentage points as a "big" or "great" improvement. Say "a bit more time in range" or "some progress."

# -----------------------------------------------------------------------------
# PROMPT SEGMENTS - Instructional guidance for LLM (not exact wording)
# -----------------------------------------------------------------------------
prompt_segments:
  
  # === POSITIVE ACTIONS ===
  positive_actions:
    
    glucose_tir_met:
      template: "Praise that their glucose stayed in target range for {tir_pct}% of the day yesterday"
      priority: 1
      requires_cgm: true
      
    glucose_tir_improved:
      template: "Celebrate that their glucose time in range went up from {prev_tir}% to {tir_pct}%"
      priority: 2
      requires_cgm: true
      
    steps_target_met:
      template: "Congratulate them on hitting {step_count} steps yesterday"
      priority: 3
      requires_step_tracker: true
      
    steps_improved:
      template: "Celebrate that they walked {step_count} steps yesterday, which is more than {prev_day_name}"
      priority: 4
      requires_step_tracker: true
      
    activity_logged:
      template: "Acknowledge they were active for {active_minutes} minutes yesterday"
      priority: 5
      
    activity_maintained:
      template: "Praise them for staying active with {active_minutes} minutes of exercise"
      priority: 6
      
    sleep_hours_met:
      template: "Acknowledge they got {sleep_hours} hours of sleep last night"
      priority: 7
      
    sleep_rating_met:
      template: "Note that their sleep quality rating was {sleep_rating}"
      priority: 8
      
    sleep_improved:
      template: "Celebrate that they slept more than the previous night"
      priority: 9
      
    medication_adherence:
      template: "Praise them for taking all their medications"
      priority: 10
      requires_medications: true
      
    meal_logged:
      template: "Acknowledge they logged their {meal_type} yesterday"
      priority: 11
      
    nutrient_target_met:
      template: "Congratulate them on meeting their {nutrient_name} target"
      priority: 12
      
    weight_logged:
      template: "Acknowledge they logged their weight"
      priority: 13
      max_weekly: 2
      no_back_to_back: true
      
    weight_decreased:
      template: "Celebrate that their weight is trending downward"
      priority: 14
      requires_weight_goal: true
      goal_type: "lose"
      max_weekly: 2
      no_back_to_back: true
      
    weight_maintained:
      template: "Praise them for keeping their weight steady and on track"
      priority: 15
      requires_weight_goal: true
      goal_type: "maintain"
      max_weekly: 2
      no_back_to_back: true
      
    journey_task_completed:
      template: "Celebrate that they completed a step in their Journey"
      priority: 0  # Highest priority when active
      requires_journey: true
      
    meditation_opened:
      template: "Acknowledge they made time for meditation"
      priority: 16
      category: "mental_wellbeing"
      
    journal_entry:
      template: "Praise them for writing a journal entry"
      priority: 17
      category: "mental_wellbeing"
      
    action_plan_progress:
      template: "Celebrate that they made progress on their Action Plan"
      priority: 18
      category: "mental_wellbeing"
      
    exercise_program_started:
      template: "Celebrate that they started or made progress on an exercise program"
      priority: 6
      category: "activity"
      
    ai_meal_plan_generated:
      template: "Acknowledge that they generated an AI meal plan"
      priority: 12
      category: "food"
      
    article_read:
      template: "Praise them for reading a health article"
      priority: 19
      category: "explore"
      
    video_watched:
      template: "Acknowledge they watched a health video"
      priority: 20
      category: "explore"
      
    lesson_completed:
      template: "Praise them for completing a health lesson"
      priority: 20
      category: "explore"
      
    app_login:
      template: "Welcome them for logging in and encourage them to keep working on their health"
      priority: 99  # Fallback when no other positive actions
      is_fallback: true

  # === OPPORTUNITIES / SUGGESTIONS ===
  opportunities:
    
    # Weight
    weight_log_prompt:
      template: "Suggest they log their weight today to track progress"
      category: "weight"
      condition: "days_since_weight > 6"
      
    # Glucose
    glucose_improve_tir:
      template: "Encourage them to review their glucose trends in the app"
      category: "glucose"
      requires_cgm: true
      
    glucose_log_food:
      template: "Suggest logging meals to see how food impacts their glucose levels"
      category: "glucose"
      requires_cgm: true
      
    glucose_high_protein_fiber:
      template: "Suggest eating foods higher in protein and fiber today"
      category: "glucose"
      requires_cgm: true
      
    glucose_post_meal_walk:
      template: "Suggest a walk after meals to help with glucose levels"
      category: "glucose"
      requires_cgm: true
      
    glucose_set_carb_goal:
      template: "Suggest setting a daily carb goal in the app"
      category: "glucose"
      requires_cgm: true
      
    glucose_contact_provider:
      template: "Recommend talking to their healthcare provider about managing low glucose"
      category: "glucose"
      requires_cgm: true
      is_clinical: true
      
    glucose_take_medication:
      template: "Encourage the user to take their glycemic-lowering medication as prescribed to help improve their glucose"
      category: "glucose"
      requires_cgm: true
      
    glucose_contact_provider_prescribed:
      template: "Encourage the user to reach out to their healthcare provider to discuss their glucose management since they are taking their medication and logging meals"
      category: "glucose"
      requires_cgm: true
      is_clinical: true
      
    glucose_pay_attention:
      template: "Encourage the user to pay attention to their glucose today to try to understand when their glucose goes out of range"
      category: "glucose"
      requires_cgm: true
      
    # Activity
    activity_be_active:
      template: "Encourage them to be more active today, even just 10 minutes"
      category: "activity"
      
    activity_suggestions:
      - "Suggest a short 10-minute morning walk or stretch"
      - "Suggest a walk during their lunch break"
      - "Suggest taking the stairs instead of the elevator"
      - "Suggest an after-dinner walk"
      - "Suggest a quick workout while watching TV"
      - "Suggest inviting a friend to exercise together"
      
    activity_exercise_program:
      template: "Encourage them to try the next exercise from their exercise program"
      category: "activity"
      requires_exercise_program: true
      
    activity_exercise_video:
      template: "Suggest trying an exercise video at home"
      category: "activity"
      
    # Steps
    steps_increase:
      template: "Encourage them to take more steps today, every step counts"
      category: "steps"
      requires_step_tracker: true
      
    # Food
    food_continue_logging:
      template: "Encourage continued meal logging and checking the Food section for insights"
      category: "food"
      
    food_start_logging:
      template: "Suggest they start logging meals to learn about their eating patterns"
      category: "food"
      
    food_log_lunch:
      template: "Suggest also logging lunch and checking the Food section for insights"
      category: "food"
      
    food_nutrient_attention:
      template: "Suggest logging all meals today and reviewing their nutrient totals"
      category: "food"
      
    food_healthy_suggestions:
      - template: "Suggest eating more vegetables today"
        key: "food_healthy_vegetables"
      - template: "Suggest adding more fruits to their day"
        key: "food_healthy_fruits"
      - template: "Suggest choosing whole grains when possible"
        key: "food_healthy_whole_grains"
      - template: "Suggest drinking more water today"
        key: "food_healthy_water"
      - template: "Suggest cooking at home tonight"
        key: "food_healthy_cook_home"
      - template: "Suggest making portions a little smaller"
        key: "food_healthy_smaller_portions"
      - template: "Suggest trying the AI meal planner for healthy meal ideas"
        key: "food_healthy_ai_meal_planner"
      - template: "Suggest trying a new healthy recipe"
        key: "food_healthy_new_recipe"
      
    # Sleep
    sleep_continue:
      template: "Encourage them to keep up their great sleep habits"
      category: "sleep"
      
    sleep_improvement_suggestions:
      - template: "Suggest setting a bedtime alarm to get more sleep tonight"
        key: "sleep_improvement_bedtime_alarm"
      - template: "Suggest keeping their room cooler tonight"
        key: "sleep_improvement_cool_room"
      - template: "Suggest limiting screen time before bed tonight"
        key: "sleep_improvement_screen_time"
      - template: "Suggest trying a guided meditation in the app before bed tonight"
        key: "sleep_improvement_meditate"
      - template: "Suggest eating lighter portions at dinner tonight"
        key: "sleep_improvement_lighter_dinner"
      - template: "Suggest limiting caffeine this afternoon"
        key: "sleep_improvement_limit_caffeine"
      - template: "Suggest exercising more during the day to improve sleep"
        key: "sleep_improvement_exercise"
      - template: "Suggest making their room darker tonight"
        key: "sleep_improvement_darker_room"
      - template: "Suggest making their room quieter tonight"
        key: "sleep_improvement_quieter_room"
      - template: "Suggest listening to calm music before bed"
        key: "sleep_improvement_calm_music"
      - template: "Suggest setting a sleep schedule and sticking to it"
        key: "sleep_improvement_schedule"
      - template: "Suggest trying a relaxing bath before bed"
        key: "sleep_improvement_bath"
      - template: "Suggest limiting alcohol before bed"
        key: "sleep_improvement_limit_alcohol"
      
    sleep_log_prompt:
      template: "Suggest logging their sleep to discover patterns over time"
      category: "sleep"
      
    # Medications
    medication_reminders:
      template: "Suggest setting medication reminders to stay on track"
      category: "medications"
      requires_medications: true
      
    # Mental Well-being
    mental_try_meditation:
      template: "Suggest trying a meditation session to help manage stress"
      category: "mental_wellbeing"
      
    mental_action_plan:
      template: "Encourage working on an Action Plan to set personal goals"
      category: "mental_wellbeing"
      
    mental_journaling:
      template: "Suggest journaling to reflect on their feelings"
      category: "mental_wellbeing"
      
    # Default / Explore
    explore_browse:
      template: "Suggest browsing the Explore section for health management tips"
      category: "explore"
      is_fallback: true

# -----------------------------------------------------------------------------
# USER PROMPT TEMPLATE - Sent to LLM with context
# -----------------------------------------------------------------------------
user_prompt_template: |
  Generate a brief, personalized health message with EXACTLY 1 paragraph:
  
  Start with "{greeting}" then weave in these points using your own natural wording:
  {positive_facts_list}
  
  End with this suggestion (rephrase in your own words):
  {opportunity_suggestion}
  
  {weekly_context}
  
  IMPORTANT: Do NOT copy the instructions above word-for-word. Use them as guidance and write the message in your own natural, conversational voice. Do NOT add ratings or generic motivation. Go directly from acknowledgment to suggestion. If weekly context is provided, use it to briefly explain why the suggestion matters even if yesterday looked good.

# -----------------------------------------------------------------------------
# FOCUS AREA MAPPINGS - Which categories apply to each focus
# -----------------------------------------------------------------------------
focus_area_mappings:
  weight:
    include: ["weight", "glucose", "food", "activity", "steps", "sleep"]
    
  glucose:
    include: ["glucose", "food", "activity", "medications"]
    
  activity:
    include: ["activity", "steps"]
    
  food:
    include: ["food"]
    
  sleep:
    include: ["sleep", "activity"]
    
  anxiety:
    include: ["mental_wellbeing", "sleep", "activity"]
    
  medications:
    include: ["medications", "glucose"]

# -----------------------------------------------------------------------------
# PRIORITY RULES - Order of category prioritization
# -----------------------------------------------------------------------------
priority_rules:
  # Higher number = higher priority
  journey_active: 100
  cgm_with_good_tir: 90
  weight_goal_active: 80
  medications_on_list: 0  # Disabled per clinical feedback: was causing over-indexing on medication adherence
  user_focus_area: 60
  not_shown_6_days: 200  # High enough to guarantee display when a category hasn't been shown in 6 days
  variety: 40
  
  # Streak override: If excelling in category for 3 days, drop priority
  streak_override_days: 3
  streak_priority_penalty: 30

# -----------------------------------------------------------------------------
# MESSAGE HISTORY RULES
# -----------------------------------------------------------------------------
message_history:
  weight_max_per_week: 2
  weight_no_consecutive: true
  category_lookback_days: 6
  streak_detection_days: 3
